<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR Romcarbon - Admin Panou Prezentare</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #154212;
            --surface: #F5DEC6;
            --clay: #775839;
            --bg: #F5F3ED;
            --white: #ffffff;
            --radius: 20px;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            padding: 40px 20px;
        }
        .admin-card {
            background: var(--white);
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(21,66,18,0.05);
            box-sizing: border-box;
        }
        h1 {
            font-family: 'Noto Serif', serif;
            margin-top: 0;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--clay);
        }
        input, textarea, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(119,88,57,0.2);
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            background: var(--bg);
            color: var(--primary);
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-surface {
            background: var(--surface);
            color: var(--primary);
            margin-bottom: 20px;
        }
        .btn-delete {
            background: #d32f2f;
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            width: auto;
            margin-top: 10px;
            font-size: 14px;
        }
        .option-row {
            margin-bottom: 25px;
            background: rgba(245, 222, 198, 0.2);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--clay);
        }
        .row-flex {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .row-flex > div {
            flex: 1;
        }
        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
        }
        .alert-success {
            background: rgba(46, 125, 50, 0.1);
            color: #2e7d32;
        }
        .alert-error {
            background: rgba(211, 47, 47, 0.1);
            color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="admin-card">
    <h1>Editează Componentele Site-ului</h1>
    <p style="color: var(--clay); margin-bottom: 30px; font-size: 14px;">Definește tipurile de împrumut (cardurile publicate și setările din calculator).</p>

    <form id="adminForm">
        <div class="form-group">
            <label for="ghToken">GitHub Personal Access Token (PAT obligatoriu)</label>
            <input type="password" id="ghToken" required placeholder="ghp_xxxxxxxxxxxxxxxxx">
        </div>
        
        <hr style="border: 0; border-top: 1px dashed rgba(119,88,57,0.2); margin: 30px 0;">

        <div id="dynamicFields"></div>

        <button type="button" class="btn-surface" id="btnAddOption">+ Adaugă Tip Împrumut Nou</button>
        <button type="submit" id="btnSubmit">🚀 Publică pe Site Modificările</button>
        
        <div id="alertBox" class="alert alert-success"></div>
    </form>
</div>

<script>
    let optionsData = [];

    function renderFields() {
        const container = document.getElementById('dynamicFields');
        container.innerHTML = '';
        
        optionsData.forEach((opt, index) => {
            const row = document.createElement('div');
            row.className = 'option-row';
            
            // Textarea value
            const featuresText = (opt.features || []).join('\\n');

            row.innerHTML = `
                <div class="row-flex">
                    <div style="flex:2">
                        <label>Nume Tip Împrumut</label>
                        <input type="text" value="${opt.label}" onchange="updateOpt(${index}, 'label', this.value)" required>
                    </div>
                    <div style="flex:1">
                        <label>Dobândă (%)</label>
                        <input type="number" step="0.1" value="${opt.rate}" onchange="updateOpt(${index}, 'rate', parseFloat(this.value))" required>
                    </div>
                    <div style="flex:1">
                        <label>Apare ca PROMOȚIE?</label>
                        <select onchange="updateOpt(${index}, 'is_promo', this.value === 'true')">
                            <option value="false" ${!opt.is_promo ? 'selected' : ''}>Nu</option>
                            <option value="true" ${opt.is_promo ? 'selected' : ''}>Da (Evidențiat)</option>
                        </select>
                    </div>
                </div>
                <div class="row-flex">
                    <div style="flex:1">
                        <label>ID Tehnic (fără spații)</label>
                        <input type="text" value="${opt.id}" onchange="updateOpt(${index}, 'id', this.value)" required>
                    </div>
                    <div style="flex:1">
                        <label>Nume Iconiță (ex: bolt, eco, home)</label>
                        <input type="text" value="${opt.icon || 'payments'}" onchange="updateOpt(${index}, 'icon', this.value)" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Caracteristici (fiecare pe rând nou)</label>
                    <textarea rows="4" onchange="updateFeatures(${index}, this.value)" placeholder="Până la 10.000 lei...">${featuresText}</textarea>
                </div>
                <div style="text-align: right;">
                    <button type="button" class="btn-delete" title="Șterge Opțiune" onclick="removeOpt(${index})">Șterge Complet Cardul</button>
                </div>
            `;
            container.appendChild(row);
        });
    }

    window.updateOpt = function(index, field, value) {
        optionsData[index][field] = value;
    }

    window.updateFeatures = function(index, textValue) {
        optionsData[index].features = textValue.split('\\n').filter(s => s.trim().length > 0);
    }

    window.removeOpt = function(index) {
        if(confirm('Sigur vrei să ștergi această opțiune din site?')) {
            optionsData.splice(index, 1);
            renderFields();
        }
    }

    document.getElementById('btnAddOption').addEventListener('click', () => {
        optionsData.push({ 
            id: "nou_" + Math.floor(Math.random()*100), 
            label: "Credit Nou", 
            rate: 10.0, 
            is_promo: false, 
            icon: "payments", 
            features: ["Caracteristică 1"] 
        });
        renderFields();
    });

    // Fetch config on load
    fetch('../data/config.json')
        .then(res => res.json())
        .then(data => {
            if(data && data.options) {
                optionsData = data.options;
                renderFields();
            }
        }).catch(err => {
            console.log("JSON not found / CORS. Utilizare mock local fallback.");
            optionsData = [
                { id: "standard", label: "Credit Standard", rate: 9.0, is_promo: true, icon: "bolt", features: ["12-60 luni"] }
            ];
            renderFields();
        });

    document.getElementById('adminForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const alertBox = document.getElementById('alertBox');
        
        const token = document.getElementById('ghToken').value.trim();
        const payloadJson = JSON.stringify({ options: optionsData }, null, 2);

        btn.disabled = true;
        btn.textContent = 'Trimitere spre GitHub...';
        alertBox.style.display = 'none';

        try {
            const response = await fetch('https://api.github.com/repos/bogdan-nicaa/car-romcarbon/actions/workflows/update-rates.yml/dispatches', {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': 'Bearer ' + token,
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: { config_json: payloadJson }
                })
            });

            if (response.ok) {
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Succes! Modificările sunt procesate pe GitHub și vor fi live (Carduri și Calculator) în aprox. 30 de secunde.';
                alertBox.style.display = 'block';
            } else {
                const errData = await response.json().catch(() => ({}));
                alertBox.className = 'alert alert-error';
                alertBox.textContent = 'Eroare: ' + (errData.message || response.statusText);
                alertBox.style.display = 'block';
            }
        } catch (error) {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Eroare de rețea.';
            alertBox.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = '🚀 Publică pe Site Modificările';
    });
</script>

</body>
</html>
