<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAR Romcarbon - Panou de Administrare Dinamic</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #154212;
            --surface: #F5DEC6;
            --clay: #775839;
            --bg: #F5F3ED;
            --white: #ffffff;
            --radius: 20px;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .admin-card {
            background: var(--white);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(21,66,18,0.05);
        }
        h1 {
            font-family: 'Noto Serif', serif;
            margin-top: 0;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--clay);
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(119,88,57,0.2);
            border-radius: 12px;
            font-family: inherit;
            font-size: 16px;
            box-sizing: border-box;
            background: var(--bg);
            color: var(--primary);
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-top: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-surface {
            background: var(--surface);
            color: var(--primary);
            margin-bottom: 20px;
        }
        .btn-delete {
            width: auto;
            background: #d32f2f;
            padding: 14px 18px;
            margin-top: 28px;
            font-size: 20px;
            line-height: 1;
        }
        .option-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            background: rgba(245, 222, 198, 0.2);
            padding: 15px;
            border-radius: 12px;
            align-items: flex-start;
        }
        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
        }
        .alert-success {
            background: rgba(46, 125, 50, 0.1);
            color: #2e7d32;
        }
        .alert-error {
            background: rgba(211, 47, 47, 0.1);
            color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="admin-card">
    <h1>Editează Configurația Site-ului</h1>
    <p style="color: var(--clay); margin-bottom: 30px; font-size: 14px;">Acum poți adăuga, modifica opțiuni noi la infinit în calculator.</p>

    <form id="adminForm">
        <div class="form-group">
            <label for="ghToken">GitHub Personal Access Token (PAT obligatoriu)</label>
            <input type="password" id="ghToken" required placeholder="ghp_xxxxxxxxxxxxxxxxx">
        </div>
        
        <hr style="border: 0; border-top: 1px dashed rgba(119,88,57,0.2); margin: 30px 0;">
        <h2>Opțiuni Împrumut</h2>

        <div id="dynamicFields">
            <!-- Rândurile se vor popula din JS -->
        </div>

        <button type="button" class="btn-surface" id="btnAddOption">+ Adaugă o opțiune nouă</button>
        <button type="submit" id="btnSubmit">🚀 Publică pe Site Modificările</button>
        
        <div id="alertBox" class="alert alert-success"></div>
    </form>
</div>

<script>
    let optionsData = [];

    function renderFields() {
        const container = document.getElementById('dynamicFields');
        container.innerHTML = '';
        
        optionsData.forEach((opt, index) => {
            const row = document.createElement('div');
            row.className = 'option-row';
            row.innerHTML = `
                <div style="flex:1">
                    <label>ID Tehnic (eng)</label>
                    <input type="text" value="${opt.id}" onchange="updateOpt(${index}, 'id', this.value)" required placeholder="ex: standard">
                </div>
                <div style="flex:2">
                    <label>Nume Afișat în Calculator</label>
                    <input type="text" value="${opt.label}" onchange="updateOpt(${index}, 'label', this.value)" required placeholder="ex: Standard">
                </div>
                <div style="flex:1">
                    <label>Dobândă (%)</label>
                    <input type="number" step="0.1" value="${opt.rate}" onchange="updateOpt(${index}, 'rate', parseFloat(this.value))" required>
                </div>
                <button type="button" class="btn-delete" title="Șterge Opțiune" onclick="removeOpt(${index})">&#10006;</button>
            `;
            container.appendChild(row);
        });
    }

    window.updateOpt = function(index, field, value) {
        optionsData[index][field] = value;
    }

    window.removeOpt = function(index) {
        if(confirm('Sigur vrei să ștergi această opțiune?')) {
            optionsData.splice(index, 1);
            renderFields();
        }
    }

    document.getElementById('btnAddOption').addEventListener('click', () => {
        optionsData.push({ id: "nou", label: "Opțiune Nouă", rate: 5.0 });
        renderFields();
    });

    // Preluare istoric din site
    fetch('../data/config.json')
        .then(res => res.json())
        .then(data => {
            if(data && data.options) {
                optionsData = data.options;
                renderFields();
            }
        }).catch(err => {
            console.log("Fișier JSON inaccesibil local. Folosesc fallback temporar.");
            optionsData = [
                { id: "standard", label: "Standard", rate: 9.0 }
            ];
            renderFields();
        });

    document.getElementById('adminForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const alertBox = document.getElementById('alertBox');
        
        const token = document.getElementById('ghToken').value.trim();
        
        // Pachetul final pe care îl zippăm către GitHub Actions via workflow_dispatch
        const payloadJson = JSON.stringify({ options: optionsData }, null, 2);

        btn.disabled = true;
        btn.textContent = 'Trimitere spre GitHub, durează câteva secunde...';
        alertBox.style.display = 'none';

        try {
            const response = await fetch('https://api.github.com/repos/bogdan-nicaa/car-romcarbon/actions/workflows/update-rates.yml/dispatches', {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github+json',
                    'Authorization': 'Bearer ' + token,
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: { config_json: payloadJson }
                })
            });

            if (response.ok) {
                alertBox.className = 'alert alert-success';
                alertBox.textContent = 'Succes! Comanda a ajuns pe serverele GitHub. Noul JSON public va fi live pe site în ~30 de secunde.';
                alertBox.style.display = 'block';
            } else {
                const errData = await response.json().catch(() => ({}));
                alertBox.className = 'alert alert-error';
                alertBox.textContent = 'Eroare autentificare: ' + (errData.message || response.statusText) + '. Te rugăm să verifici dacă Token-ul tău are permisiuni de "repo" / "Actions".';
                alertBox.style.display = 'block';
            }
        } catch (error) {
            alertBox.className = 'alert alert-error';
            alertBox.textContent = 'Eroare conexiune: ' + error.message;
            alertBox.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = '🚀 Publică pe Site Modificările';
    });
</script>

</body>
</html>
