name: Actualizare Configuratie
on:
  workflow_dispatch:
    inputs:
      config_json:
        description: 'New JSON payload'
        required: true

jobs:
  update-config:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Overwrite config.json
        run: |
          echo '${{ github.event.inputs.config_json }}' > data/config.json
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/config.json
          git commit -m "Auto: Actualizare dobanzi & optiuni prin panoul de control 🚀" || echo "No changes to commit"
          git push
